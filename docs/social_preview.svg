<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--accent-color)" flood-opacity="var(--glow-opacity)"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent-color: #2563EB;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #a0aec0;
                --text-badge: #718096;
                --accent-color: #2563EB;
                --badge-border: #2C3E50;
                --glow-opacity: 0.25;
            }
        }
        .bg-border {
            stroke: var(--accent-color);
            stroke-opacity: 0.15;
        }
        .logo-group {
            fill: var(--accent-color);
        }
        .text-title {
            fill: var(--text-title);
        }
        .text-subtitle {
            fill: var(--text-subtitle);
        }
        .text-badge-dev {
            fill: var(--accent-color);
        }
        .text-badge-gh {
            fill: var(--text-badge);
        }
        .badge-rect-dev {
            fill: var(--accent-color);
            fill-opacity: 0.12;
            stroke: var(--accent-color);
            stroke-opacity: 0.3;
        }
        .badge-rect-gh {
            stroke: var(--badge-border);
        }
        .divider {
            stroke: var(--accent-color);
        }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- Centered Eagle Logo -->
    <g transform="translate(446.4, 40) scale(0.6)" filter="url(#glow)" class="logo-group">
        <!-- Left Wing -->
        <path d="M 253 175 L 225 185 L 212 240 L 235 330 L 253 410 Z" />
        <path d="M 250 350 L 225 410 L 238 395 L 250 410 Z" />
        <path d="M 215 175 L 80 105 L 50 155 L 190 225 Z" />
        <path d="M 195 237.5 L 95 187.5 L 65 237.5 L 165 287.5 Z" />
        <path d="M 170 300 L 110 270 L 80 320 L 140 350 Z" />
        
        <!-- Right Wing (mirrored) -->
        <g transform="translate(512, 0) scale(-1, 1)">
            <path d="M 253 175 L 225 185 L 212 240 L 235 330 L 253 410 Z" />
            <path d="M 250 350 L 225 410 L 238 395 L 250 410 Z" />
            <path d="M 215 175 L 80 105 L 50 155 L 190 225 Z" />
            <path d="M 195 237.5 L 95 187.5 L 65 237.5 L 165 287.5 Z" />
            <path d="M 170 300 L 110 270 L 80 320 L 140 350 Z" />
        </g>
        
        <!-- Head -->
        <path d="M 238 140 L 256 95 L 288 125 L 276 135 L 256 160 Z" />
    </g>

    <!-- Centered information block (Text) -->
    <g transform="translate(600, 320)">
        <!-- Profile Title -->
        <text x="0" y="30" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="38" font-weight="850" letter-spacing="1.2" class="text-title" text-anchor="middle">MERT TORUN, M.Sc.</text>
        
        <!-- Center-aligned Divider line -->
        <line x1="-200" y1="65" x2="200" y2="65" class="divider" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Tagline / Subtitle -->
        <text x="0" y="115" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="18" font-weight="500" class="text-subtitle" letter-spacing="0.5" text-anchor="middle">IT Security Architect · Systems Engineer</text>

        <!-- Technical Domain Badge (centered on left side of group) -->
        <g transform="translate(-197.5, 160)">
            <rect x="0" y="0" width="220" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="110" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="13" font-weight="700" class="text-badge-dev" text-anchor="middle" letter-spacing="1">RESEARCH &amp; DEVELOPMENT</text>
        </g>

        <!-- GitHub Handle Badge (centered on right side of group) -->
        <g transform="translate(37.5, 160)">
            <rect x="0" y="0" width="160" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="80" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="13" font-weight="700" class="text-badge-gh" text-anchor="middle" letter-spacing="1">@mtorun0x7cd</text>
        </g>
    </g>
</svg>
